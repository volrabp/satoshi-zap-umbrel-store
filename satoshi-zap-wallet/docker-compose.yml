version: "3.7"

services:
  web:
    image: ghcr.io/volrabp/satoshi-zap:1.1.0
    restart: on-failure
    environment:
      - PORT=3020
      - LNBITS_URL=http://umbrel-lnbits-web-1:5000
      - LNBITS_BASE_URL=http://umbrel-lnbits-web-1:5000
      - HTTPS_ENABLED=false
    ports:
      - "3020:3020"
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
