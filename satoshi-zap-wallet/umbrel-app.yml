releaseNotes: >
  Update to v1.2.50. Enlarged Admin label in header, fixed license page layout grids on large monitors, and stabilized PRO mode startup against settings loading race conditions.
  Verze 1.2.50. Zvětšen nápis Admin v záhlaví, opraven vzhled licenčních sekcí na velkých monitorech a vyřešeno nechtěné přepínání PRO režimu na BASIC při startu administrace.
