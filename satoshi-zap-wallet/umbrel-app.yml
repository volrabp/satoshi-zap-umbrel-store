releaseNotes: >
  Update to v1.2.36. Integrated the production serverless licensing gateway deployed globally on Cloudflare Workers (https://satoshi-zap-license-worker.volrabp.workers.dev). Replaced the developer public verification key with the newly generated Ed25519 pair to secure PRO licensing handshakes and verify cryptographic license keys locally offline.
  Verze 1.2.36. Integrován produkční serverless licenční server běžící globálně na Cloudflare Workers (https://satoshi-zap-license-worker.volrabp.workers.dev). Vývojový veřejný klíč byl nahrazen nově vygenerovaným produkčním párem Ed25519 pro zabezpečenou aktivaci a offline verifikaci licencí PRO verze.
