manifestVersion: 1.1
id: satoshi-zap-wallet
icon: https://raw.githubusercontent.com/volrabp/satoshi-zap-umbrel-store/main/satoshi-zap-wallet/icon.svg
category: bitcoin
name: Satoshi Zap
version: "1.2.22"
tagline: Smart Bitcoin Lightning wallet and exchange gateway
description: >
  Satoshi Zap is an advanced, highly optimized self-hosted Bitcoin Lightning wallet and dashboard.
  It offers full integration with your LNbits instance and direct connections to leading global and European exchanges (Coinmate, Bybit, Strike, Coinbase, Binance) for high-speed fiat-to-bitcoin purchases and submarine swaps (via Boltz.exchange).
  
  The application features a built-in smart AI assistant (Google Gemini) that automatically classifies your transactions, cleans up merchant names, and answers questions about your spending in CZK, EUR, or USD. Runs natively as a Progressive Web App (PWA).
developer: Petr Volrab
website: https://github.com/volrabp/SatoshiZap
dependencies:
  - lnbits
repo: https://github.com/volrabp/SatoshiZap
support: https://github.com/volrabp/SatoshiZap
port: 3020
gallery: []
path: "admin"
defaultPassword: ""
releaseNotes: >
  Update to v1.2.22. English-first language switch priority, default fallback domain to gateway IP 172.17.0.1, and warning banner when category initialization is missing.
  Verze 1.2.22. Angličtina jako výchozí volba, defaultní fallback doména na bránu 172.17.0.1 a varovný banner při chybějící inicializaci kategorií.
submitter: Petr Volrab
submission: https://github.com/volrabp/SatoshiZap
